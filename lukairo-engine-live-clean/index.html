<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LUKAIRO Engine - Neural Core Visualization and AI Platform" />
  <title>LUKAIRO Engine</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <section id="lukairo-engine">
    <div id="neural-core-container" role="main" aria-label="LUKAIRO Neural Core Visualization">
      <div class="neural-core-loading" id="loading-overlay">
        <div class="loading-spinner"></div>
      </div>

      <div class="neural-core-fallback" id="fallback-message">
        <h2 id="fallback-title">Initialization Failed</h2>
        <p id="fallback-text">Unknown error.</p>
      </div>

      <div class="neural-core-info">
        LUKAIRO Neural Core • 3D Visualization
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="./neural-core.js"></script>
  <script>
    (function () {
      const loadingOverlay = document.getElementById("loading-overlay");
      const fallback = document.getElementById("fallback-message");
      const fallbackTitle = document.getElementById("fallback-title");
      const fallbackText = document.getElementById("fallback-text");

      function showError(title, message) {
        console.error(title + ":", message);
        if (loadingOverlay) loadingOverlay.style.display = "none";
        if (fallbackTitle) fallbackTitle.textContent = title;
        if (fallbackText) fallbackText.textContent = String(message);
        if (fallback) fallback.classList.add("active");
      }

      if (loadingOverlay) loadingOverlay.style.display = "flex";

      try {
        if (!window.THREE) {
          throw new Error("three.min.js did not load");
        }

        if (!window.NeuralCore) {
          throw new Error("neural-core.js did not load");
        }

        const neuralCore = new window.NeuralCore({
          containerId: "neural-core-container"
        });

        neuralCore.init();
        window.lukairoCoreInstance = neuralCore;
      } catch (error) {
        showError("Initialization Failed", error && error.message ? error.message : error);
      }
    })();
  </script>
</body>
</html>
