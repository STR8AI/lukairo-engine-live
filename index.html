<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUKAIRO Engine</title>

  <!-- FIXED CSS PATH -->
  <link rel="stylesheet" href="./style.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #090c11;
      color: #E8EAED;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    #lukairo-engine {
      width: 100vw;
      height: 100vh;
    }

    #neural-core-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<!-- SIMPLE HEADER (so you see something immediately) -->
<div style="position:absolute; top:20px; left:20px; z-index:100; color:#6CEAD9;">
  <h1 style="margin:0;">LUKAIRO</h1>
  <p style="margin:0;">Neural Core Engine</p>
</div>

<section id="lukairo-engine">
  <div id="neural-core-container"></div>
</section>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<!-- FIXED JS PATH -->
<script src="./engine.js"></script>

<script>
(function () {
  setTimeout(() => {
    if (window.NeuralCore && window.THREE) {
      const core = new window.NeuralCore({
        containerId: "neural-core-container",
        texturePath: "./images/"   // ✅ FIXED
      });

      core.init();
    } else {
      console.log("NeuralCore failed to load");
    }
  }, 1000);
})();
</script>

</body>
</html>
