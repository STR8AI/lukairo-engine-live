<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUKAIRO Engine</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      margin: 0;
      background: #090c11;
      color: #E8EAED;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .site-header {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .site-header h1 {
      margin: 0;
      color: #6CEAD9;
      font-size: 3rem;
      line-height: 1;
    }

    .site-header p {
      margin: 8px 0 0;
      color: #6CEAD9;
      font-size: 1.5rem;
    }

    #scene {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #090c11;
    }
  </style>
</head>
<body>
  <div class="site-header">
    <h1>LUKAIRO</h1>
    <p>Neural Core Engine</p>
  </div>

  <canvas id="scene"></canvas>

  <script type="module" src="./engine.js"></script>
</body>
</html>
