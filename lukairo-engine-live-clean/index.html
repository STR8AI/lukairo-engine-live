<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LUKAIRO Engine - Neural Core Visualization and AI Platform" />
  <title>LUKAIRO Engine</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <section id="lukairo-engine">
    <div id="neural-core-container" role="main" aria-label="LUKAIRO Neural Core Visualization">
      <div class="neural-core-loading" id="loading-overlay">
        <div class="loading-spinner"></div>
      </div>

      <div class="neural-core-fallback" id="fallback-message">
        <h2>WebGL Not Available</h2>
        <p>Your browser doesn't support WebGL or it's disabled.</p>
        <p>Please enable WebGL to view the Neural Core visualization.</p>
      </div>

      <div class="neural-core-info">
        LUKAIRO Neural Core • 3D Visualization
      </div>
    </div>
  </section>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="./neural-core.js"></script>
  <script>
    (function () {
      if (window.NeuralCore && window.THREE) {
        const neuralCore = new window.NeuralCore({
          containerId: "neural-core-container",
          texturePath: "./images/"
        });

        const loadingOverlay = document.getElementById("loading-overlay");
        if (loadingOverlay) {
          loadingOverlay.style.display = "flex";
        }

        neuralCore.init();
        window.lukairoCoreInstance = neuralCore;

        setTimeout(() => {
          if (loadingOverlay) {
            loadingOverlay.style.display = "none";
          }
        }, 1200);
      } else {
        console.error("NeuralCore failed to load");
        const fallback = document.getElementById("fallback-message");
        if (fallback) {
          fallback.classList.add("active");
        }
      }
    })();
  </script>
</body>
</html>
